{% extends "base.html" %}

{% block content %}
<div class="container mx-auto p-8">
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <!-- LEFT: INPUTS -->
        <div class="lg:col-span-1 bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
            <h2 class="text-xl font-bold mb-6 text-green-800">1. Input Parameters</h2>
            
            <!-- Crop Selection -->
            <div class="grid grid-cols-3 gap-2 mb-6">
                <button onclick="setCrop('potato')" id="btn-potato" class="crop-btn active py-3 rounded-xl border border-green-200 bg-green-50 font-bold text-green-700 hover:bg-green-100 transition">Potato</button>
                <button onclick="setCrop('rice')" id="btn-rice" class="crop-btn py-3 rounded-xl border border-gray-200 text-gray-600 hover:bg-gray-50 transition">Rice</button>
                <button onclick="setCrop('makhana')" id="btn-makhana" class="crop-btn py-3 rounded-xl border border-gray-200 text-gray-600 hover:bg-gray-50 transition">Makhana</button>
            </div>

            <!-- Sliders -->
            <div class="space-y-6">
                <div>
                    <label class="flex justify-between font-medium text-sm text-gray-600 mb-2">
                        Temperature <span><strong id="val-t" class="text-lg text-gray-800">25</strong>°C</span>
                    </label>
                    <input type="range" id="temp" min="5" max="45" value="25" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-green-600" oninput="document.getElementById('val-t').innerText = this.value">
                </div>
                <div>
                    <label class="flex justify-between font-medium text-sm text-gray-600 mb-2">
                        Humidity <span><strong id="val-h" class="text-lg text-gray-800">60</strong>%</span>
                    </label>
                    <input type="range" id="hum" min="20" max="100" value="60" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600" oninput="document.getElementById('val-h').innerText = this.value">
                </div>
                <div>
                    <label class="flex justify-between font-medium text-sm text-gray-600 mb-2">
                        Rainfall <span><strong id="val-r" class="text-lg text-gray-800">0</strong>mm</span>
                    </label>
                    <input type="range" id="rain" min="0" max="150" value="0" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-indigo-600" oninput="document.getElementById('val-r').innerText = this.value">
                </div>
                <div id="div-depth" class="hidden">
                    <label class="flex justify-between font-medium text-sm text-gray-600 mb-2">
                        Water Depth <span><strong id="val-d" class="text-lg text-gray-800">1.0</strong>m</span>
                    </label>
                    <input type="range" id="depth" min="0" max="3.0" step="0.1" value="1.0" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-cyan-600" oninput="document.getElementById('val-d').innerText = this.value">
                </div>
            </div>

            <button onclick="predict()" class="mt-8 w-full bg-green-700 hover:bg-green-800 text-white font-bold py-4 rounded-xl shadow-lg transition-all transform hover:-translate-y-1">
                RUN DIAGNOSIS
            </button>
        </div>

        <!-- RIGHT: RESULTS -->
        <div class="lg:col-span-2 space-y-6">
            
            <!-- Result Box -->
            <div id="result-box" class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 hidden">
                <div class="flex flex-col md:flex-row gap-8">
                    <!-- Image -->
                    <div class="w-full md:w-1/3">
                        <div class="aspect-square rounded-xl overflow-hidden bg-gray-100 relative">
                            <img id="res-img" src="" class="w-full h-full object-cover">
                            <div class="absolute top-2 right-2 bg-black bg-opacity-70 text-white text-xs px-2 py-1 rounded">AI PREDICTION</div>
                        </div>
                    </div>
                    
                    <!-- Text -->
                    <div class="w-full md:w-2/3 flex flex-col justify-between">
                        <div>
                            <div class="flex items-center gap-3 mb-2">
                                <span id="res-badge" class="px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider bg-red-100 text-red-800">High Risk</span>
                                <span id="res-ndvi" class="text-xs text-gray-500 font-mono">NDVI: 0.75</span>
                            </div>
                            <h3 id="res-disease" class="text-3xl font-black text-gray-800 mb-4">Late Blight</h3>
                            
                            <div class="bg-blue-50 border-l-4 border-blue-500 p-4 rounded-r-lg">
                                <h4 class="font-bold text-blue-900 text-sm uppercase mb-1">Prescribed Action</h4>
                                <p id="res-cure" class="text-blue-800">Spray Mancozeb immediately.</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Loader -->
            <div id="loader" class="hidden text-center py-20">
                <i class="fa-solid fa-circle-notch fa-spin text-5xl text-green-600 mb-4"></i>
                <p class="text-gray-500 font-medium animate-pulse">Connecting to Satellite & AI Server...</p>
            </div>

            <!-- Placeholder (Shown before prediction) -->
            <div id="placeholder" class="bg-white p-12 rounded-2xl border-2 border-dashed border-gray-200 text-center">
                <i class="fa-solid fa-chart-simple text-6xl text-gray-200 mb-4"></i>
                <h3 class="text-xl font-bold text-gray-400">Waiting for Input</h3>
                <p class="text-gray-400 text-sm mt-2">Adjust parameters and click "Run Diagnosis"</p>
            </div>

        </div>
    </div>
</div>

<script>
    let currentCrop = 'potato';

    function setCrop(c) {
        currentCrop = c;
        // Reset Styles
        document.querySelectorAll('.crop-btn').forEach(b => {
            b.classList.remove('bg-green-50', 'border-green-200', 'text-green-700');
            b.classList.add('text-gray-600', 'border-gray-200');
        });
        // Set Active Style
        const btn = document.getElementById('btn-'+c);
        btn.classList.remove('text-gray-600', 'border-gray-200');
        btn.classList.add('bg-green-50', 'border-green-200', 'text-green-700');
        
        // Show/Hide Depth
        const depthDiv = document.getElementById('div-depth');
        if(c === 'makhana') depthDiv.classList.remove('hidden');
        else depthDiv.classList.add('hidden');
    }

    async function predict() {
        document.getElementById('placeholder').classList.add('hidden');
        document.getElementById('result-box').classList.add('hidden');
        document.getElementById('loader').classList.remove('hidden');

        const data = {
            crop: currentCrop,
            temp: document.getElementById('temp').value,
            humidity: document.getElementById('hum').value,
            rain: document.getElementById('rain').value,
            depth: document.getElementById('depth').value
        };

        try {
            const response = await fetch('/predict_api', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await response.json();

            // Update UI
            document.getElementById('res-disease').innerText = result.disease;
            document.getElementById('res-cure').innerText = result.cure;
            document.getElementById('res-img').src = result.image;
            document.getElementById('res-ndvi').innerText = `NDVI: ${result.ndvi}`;
            
            const badge = document.getElementById('res-badge');
            if(result.status === "Safe") {
                badge.className = "px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider bg-green-100 text-green-800";
                badge.innerText = "SAFE";
            } else {
                badge.className = "px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider bg-red-100 text-red-800";
                badge.innerText = "HIGH RISK";
            }

            document.getElementById('loader').classList.add('hidden');
            document.getElementById('result-box').classList.remove('hidden');
        } catch (error) {
            alert("Error connecting to server. Is python running?");
            document.getElementById('loader').classList.add('hidden');
        }
    }
</script>
{% endblock %}
