<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CropGuard AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50 text-gray-800 flex flex-col min-h-screen">

    <!-- NAVBAR -->
    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <a href="/" class="flex items-center gap-2 text-green-700 hover:text-green-800 transition">
                <i class="fa-solid fa-seedling text-3xl"></i>
                <span class="text-2xl font-bold tracking-tight">CropGuard AI</span>
            </a>
            
            <div class="hidden md:flex space-x-8 font-medium">
                <a href="/" class="hover:text-green-600 transition">About Project</a>
                <a href="/tool" class="hover:text-green-600 transition">Prediction Tool</a>
                <a href="/resources" class="hover:text-green-600 transition">Resources</a>
            </div>
            
            <a href="/tool" class="bg-green-600 hover:bg-green-700 text-white px-5 py-2 rounded-full font-bold transition shadow-lg">
                Try Now <i class="fa-solid fa-arrow-right ml-2"></i>
            </a>
        </div>
    </nav>

    <!-- CONTENT INJECTION POINT -->
    <main class="flex-grow">
        {% block content %}{% endblock %}
    </main>

    <!-- FOOTER -->
    <footer class="bg-gray-900 text-gray-400 py-8 mt-12">
        <div class="container mx-auto px-6 text-center">
            <p class="mb-2">Developed for Final Year Project (2025)</p>
            <p class="text-sm">Powered by Random Forest Algorithm & Sentinel-2 Satellite Data</p>
        </div>
    </footer>

</body>
</html>
